<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mizigo Meter - Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --bg-dark:#04060e; --card-bg:rgba(9,15,36,0.6); --neon-purple:#8b5cf6; --neon-blue:#3b82f6; --text-main:#f8fafc; --text-muted:#64748b; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg-dark); background-image: radial-gradient(at 0% 0%, rgba(139,92,246,0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(59,130,246,0.15) 0px, transparent 50%); color:var(--text-main); font-family:'Plus Jakarta Sans',sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
    .login-container { background:var(--card-bg); border:1px solid rgba(139,92,246,0.2); border-radius:28px; padding:50px 40px; width:100%; max-width:440px; backdrop-filter:blur(20px); box-shadow:0 30px 60px rgba(0,0,0,0.5); }
    .login-header { display:flex; justify-content:center; margin-bottom:12px; }
    .brand-mizigo, .brand-meter { font-family:'Orbitron',sans-serif; font-weight:900; font-size:1.4rem; }
    .brand-meter { color:var(--neon-blue); }
    .brand-sub { display:block; font-size:0.6rem; letter-spacing:2px; color:var(--text-muted); font-weight:800; text-align:center; }
    .page-desc { text-align:center; font-size:0.85rem; color:var(--text-muted); margin-bottom:32px; line-height:1.5; }
    .form-group { margin-bottom:24px; }
    .form-label { display:block; font-size:0.8rem; font-weight:700; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
    .form-input { width:100%; background:rgba(15,23,42,0.6); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:14px 16px; color:var(--text-main); font-family:inherit; font-size:0.95rem; }
    .form-input:focus { outline:none; border-color:var(--neon-purple); box-shadow:0 0 15px rgba(139,92,246,0.25); }
    .btn-login { width:100%; background:linear-gradient(90deg,var(--neon-purple),var(--neon-blue)); border:none; border-radius:12px; color:white; padding:15px; font-size:1rem; font-weight:800; cursor:pointer; }
    .btn-login:hover { box-shadow:0 0 25px rgba(139,92,246,0.45); }
    .btn-login:disabled { opacity:0.6; cursor:not-allowed; }
    .signup-link, .forgot-link { display:block; text-align:center; margin-top:15px; font-size:0.85rem; color:var(--text-muted); text-decoration:none; }
    .signup-link span { color:var(--neon-blue); }
    .error-alert, .success-alert { padding:12px 16px; border-radius:12px; font-size:0.85rem; margin-bottom:24px; display:none; }
    .error-alert { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#f87171; }
    .success-alert { background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.3); color:#34d399; }

    html { -webkit-text-size-adjust: 100%; }
    body { padding: 16px; }
    .login-container { padding: 40px 28px; }
    @media (max-width: 480px) {
      .login-container { padding: 32px 20px; border-radius: 20px; }
      .page-desc { margin-bottom: 24px; font-size: 0.8rem; }
      .brand-mizigo, .brand-meter { font-size: 1.15rem; }
      .brand-sub { font-size: 0.55rem; letter-spacing: 1.5px; }
      .form-group { margin-bottom: 18px; }
      .form-input { padding: 12px 14px; font-size: 0.9rem; }
      .btn-login { padding: 13px; font-size: 0.95rem; }
    }
    @media (max-width: 340px) {
      .login-container { padding: 26px 16px; }
      .brand-mizigo, .brand-meter { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div>
        <div style="text-align:center;"><span class="brand-mizigo">MIZIGO</span><span class="brand-meter">METER</span></div>
        <span class="brand-sub">SMART UTILITY GATEWAY</span>
      </div>
    </div>
    <p class="page-desc">Enter your username and choose a new password to regain access to your gateway.</p>

    <div class="error-alert" id="error-alert"></div>
    <div class="success-alert" id="success-alert"></div>

    <form id="reset-form">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" id="username" required autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input class="form-input" type="password" id="new_password" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input class="form-input" type="password" id="confirm_password" required>
      </div>
      <button type="submit" class="btn-login" id="submit-btn">Reset Password</button>
    </form>

    <a href="/login.html" class="signup-link">Remembered it? <span>Back to Login</span></a>
  </div>

  <script>
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorBox = document.getElementById('error-alert');
      const successBox = document.getElementById('success-alert');
      const submitBtn = document.getElementById('submit-btn');
      errorBox.style.display = 'none';
      successBox.style.display = 'none';

      const username = document.getElementById('username').value;
      const new_password = document.getElementById('new_password').value;
      const confirm_password = document.getElementById('confirm_password').value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Resetting…';

      try {
        const res = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, new_password, confirm_password }),
        });
        const data = await res.json();

        if (!res.ok) {
          errorBox.textContent = data.error || 'Password reset failed.';
          errorBox.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Reset Password';
          return;
        }

        successBox.textContent = data.message || 'Password updated successfully.';
        successBox.style.display = 'block';
        submitBtn.textContent = 'Redirecting…';
        setTimeout(() => { window.location.href = '/login.html'; }, 1800);
      } catch (err) {
        errorBox.textContent = 'Network error. Please try again.';
        errorBox.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
